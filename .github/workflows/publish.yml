name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run all quality checks before publishing
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dart SDK
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 'stable'

    - name: Install dependencies
      run: dart pub get

    - name: Verify dependencies
      run: dart pub deps

    - name: Run analyzer
      run: dart analyze --fatal-warnings

    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Run tests
      run: dart test

    - name: Check pub publishing (dry run)
      # analysis_server_plugin mandates an entrypoint at lib/main.dart, which
      # triggers one unavoidable pub warning ("name 'main' should match the
      # package name"). Allow exactly that warning; fail on anything else.
      # (Without this, `dart pub publish --dry-run` exits 65 on the warning and
      # blocks the OIDC publish job — see CHANGELOG 2.0.x / matches ci.yml.)
      run: |
        output="$(dart pub publish --dry-run 2>&1 || true)"
        echo "$output"
        unexpected="$(printf '%s\n' "$output" | grep -E '^\* ' | grep -v 'lib/main.dart' || true)"
        if [ -n "$unexpected" ] || printf '%s\n' "$output" | grep -qE 'following error|Package has [0-9]+ error'; then
          echo "::error::Unexpected pub publish warnings/errors (see output above)."
          exit 1
        fi
        echo "OK: clean, or only the expected asp lib/main.dart naming warning."

  # Publish only if tests pass
  publish:
    needs: test
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1