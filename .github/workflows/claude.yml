name: Claude Mention Responder

# Public package: least privilege + trusted commenters only (prompt-injection).
# Body: ittae/.github claude-mention-light.yml

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  call:
    if: >-
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'COLLABORATOR' ||
      github.event.review.author_association == 'OWNER' ||
      github.event.review.author_association == 'MEMBER' ||
      github.event.review.author_association == 'COLLABORATOR'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: ittae/.github/.github/workflows/claude-mention-light.yml@main
    secrets: inherit
