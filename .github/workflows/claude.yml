name: Claude Mention Responder

# Public package: least privilege + trusted commenters only (prompt-injection).
# Body: ittae/.github claude-mention-light.yml

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  call:
    if: >-
      (contains(fromJSON('["issue_comment", "pull_request_review_comment"]'), github.event_name) &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: ittae/.github/.github/workflows/claude-mention-light.yml@main
    secrets: inherit
