name: PR body lint

# Human/agent PRs only — title/body are AI review inputs (org template).
# Dependabot/bots: skip — machine changelog ≠ agent template (lane A CI must stay green).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    if: >-
      github.event.pull_request.draft != true &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'dependabot-preview[bot]' &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr view "${{ github.event.pull_request.number }}" -R "${{ github.repository }}" --json body -q .body > /tmp/pr-body.md
      - name: Lint PR body
        run: bash .github/scripts/pr_body_lint.sh /tmp/pr-body.md
