name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dart SDK
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 'stable'

    - name: Print Dart SDK version
      run: dart --version

    - name: Install dependencies
      run: dart pub get

    - name: Verify dependencies
      run: dart pub deps

    - name: Run analyzer
      run: dart analyze

    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Run tests
      run: dart test

    - name: Check pub publishing
      # analysis_server_plugin mandates an entrypoint at lib/main.dart, which
      # triggers one unavoidable pub warning ("name 'main' should match the
      # package name"). Allow exactly that warning; fail on anything else.
      run: |
        output="$(dart pub publish --dry-run 2>&1 || true)"
        echo "$output"
        count="$(printf '%s\n' "$output" | sed -nE 's/.*Package has ([0-9]+) warning.*/\1/p')"
        count="${count:-0}"
        if [ "$count" -le 1 ] && ! printf '%s\n' "$output" | grep -qiE "error|missing required"; then
          if [ "$count" -eq 0 ] || printf '%s\n' "$output" | grep -q "lib/main.dart"; then
            echo "OK: clean, or only the expected asp lib/main.dart naming warning."
            exit 0
          fi
        fi
        echo "::error::Unexpected pub publish warnings/errors (see output above)."
        exit 1

  coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dart SDK
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 'stable'

    - name: Install dependencies
      run: dart pub get

    - name: Install coverage tools
      run: dart pub global activate coverage

    - name: Run tests with coverage
      run: dart test --coverage=coverage

    - name: Convert coverage to LCOV
      run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
