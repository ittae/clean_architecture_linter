name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: [self-hosted, clean-architecture-linter-v4]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dart SDK
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 'stable'

    - name: Print Dart SDK version
      run: dart --version

    - name: Install dependencies
      run: dart pub get

    - name: Verify dependencies
      run: dart pub deps

    - name: Run analyzer
      run: dart analyze

    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Run tests
      run: dart test

    - name: Check pub publishing
      # analysis_server_plugin mandates an entrypoint at lib/main.dart, which
      # triggers one unavoidable pub warning ("name 'main' should match the
      # package name"). Allow exactly that warning; fail on anything else.
      run: |
        output="$(dart pub publish --dry-run 2>&1 || true)"
        echo "$output"
        # Validation issues are listed as lines beginning with "* " (the file
        # tree uses box-drawing chars, so it is not matched). Drop the known
        # lib/main.dart naming issue; anything else (or an explicit error) fails.
        unexpected="$(printf '%s\n' "$output" | grep -E '^\* ' | grep -v 'lib/main.dart' || true)"
        if [ -n "$unexpected" ] || printf '%s\n' "$output" | grep -qE 'following error|Package has [0-9]+ error'; then
          echo "::error::Unexpected pub publish warnings/errors (see output above)."
          exit 1
        fi
        echo "OK: clean, or only the expected asp lib/main.dart naming warning."

  coverage:
    runs-on: [self-hosted, clean-architecture-linter-v4]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dart SDK
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 'stable'

    - name: Install dependencies
      run: dart pub get

    - name: Install coverage tools
      run: dart pub global activate coverage

    - name: Run tests with coverage
      run: dart test --coverage=coverage

    - name: Convert coverage to LCOV
      run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
