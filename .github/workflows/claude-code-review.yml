name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'example/**'
      - '*.dart'
      - 'analysis_options.yaml'
      - 'pubspec.yaml'
      - 'pubspec.lock'

jobs:
  call:
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    uses: ittae/.github/.github/workflows/claude-review-light.yml@main
    with:
      stack: 'Dart package (custom_lint rules / analyzer plugin)'
    secrets: inherit
