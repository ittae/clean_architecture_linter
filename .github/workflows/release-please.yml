name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents/pull-requests: release-please opens/merges release artifacts.
# actions: write — allow dispatching Publish to pub.dev after release_created.
# NOTE: Do not use workflow_call for publish. Nested calls inherit the caller
# event (branch push); pub.dev OIDC only allows tag push or workflow_dispatch.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Note release outcome
        if: steps.release.outputs.release_created == 'true'
        run: |
          echo "release_created=true"
          echo "tag_name=${{ steps.release.outputs.tag_name }}"
          echo "GITHUB_TOKEN tag push does not re-trigger on.push.tags workflows."
          echo "Next job dispatches Publish to pub.dev as workflow_dispatch (OIDC-allowed)."

  # Separate workflow_dispatch run so pub.dev OIDC sees event_name=workflow_dispatch
  # (not nested workflow_call under branch push).
  dispatch-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Publish to pub.dev
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          echo "Dispatching Publish to pub.dev (tag=${TAG:-unknown})"
          gh workflow run "Publish to pub.dev" --repo "${{ github.repository }}"
          # Best-effort: show the newest run URL shortly after enqueue
          sleep 3
          gh run list --repo "${{ github.repository }}" \
            --workflow "Publish to pub.dev" --limit 3 \
            --json databaseId,status,event,displayTitle,url,createdAt
