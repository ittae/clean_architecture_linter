name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents/pull-requests: release-please opens PRs and creates tags/releases.
#
# IMPORTANT — pub.dev OIDC for this package allows **git tag push only**
# (workflow_dispatch is rejected by pub.dev config).
# Tags created with the default GITHUB_TOKEN do not re-trigger publish.yml.
# Pass a PAT / GitHub App token (contents:write) via RELEASE_PLEASE_TOKEN so
# the tag push is a normal user/app event and Publish to pub.dev runs.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Prefer PAT so created tags trigger on.push.tags workflows (publish.yml).
          # Fallback to GITHUB_TOKEN only creates Release/tag without auto-publish.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Warn if publish may not auto-trigger
        if: steps.release.outputs.release_created == 'true'
        env:
          HAS_PAT: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          echo "release_created=true tag=${TAG}"
          if [ "$HAS_PAT" != "true" ]; then
            echo "::warning::RELEASE_PLEASE_TOKEN secret is not set. Tag ${TAG} was created with GITHUB_TOKEN and will NOT trigger Publish to pub.dev. Re-push the tag with a human/PAT credential, or add RELEASE_PLEASE_TOKEN (contents:write)."
          else
            echo "RELEASE_PLEASE_TOKEN present — tag push should trigger Publish to pub.dev."
          fi
